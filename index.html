<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnergyIntel Digest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08090b;
  --surface: #0f1114;
  --surface2: #14171c;
  --surface3: #1a1e24;
  --border: #1f242c;
  --border2: #262c36;
  --h2: #34d399;
  --policy: #fb923c;
  --research: #a78bfa;
  --saved: #f472b6;
  --text: #dde1e8;
  --text2: #7a8494;
  --text3: #3d4553;
  --eu: #60a5fa;
  --mena: #fbbf24;
  --americas: #f87171;
  --apac: #4ade80;
  --global: #c084fc;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Geist', sans-serif;
  min-height: 100vh;
  font-size: 14px;
}

/* Grid background */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: 
    linear-gradient(rgba(52,211,153,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(52,211,153,0.015) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

/* Glow orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
}
.orb-1 { width: 500px; height: 500px; top: -150px; left: -100px; background: radial-gradient(circle, rgba(52,211,153,0.06), transparent 70%); }
.orb-2 { width: 400px; height: 400px; bottom: -100px; right: -100px; background: radial-gradient(circle, rgba(167,139,250,0.05), transparent 70%); }

.app {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 220px 1fr;
  min-height: 100vh;
}

/* ─── SIDEBAR ─── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}

.brand {
  padding: 28px 20px 24px;
  border-bottom: 1px solid var(--border);
}

.brand-name {
  font-family: 'Instrument Serif', serif;
  font-size: 22px;
  line-height: 1.1;
  color: var(--text);
  letter-spacing: -0.3px;
}

.brand-name span { color: var(--h2); }

.brand-sub {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 6px;
}

.nav-group {
  padding: 16px 12px 8px;
}

.nav-label {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 0 8px;
  margin-bottom: 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  transition: all 0.15s ease;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}

.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--surface3); color: var(--text); }
.nav-item.active.type-h2 { color: var(--h2); }
.nav-item.active.type-policy { color: var(--policy); }
.nav-item.active.type-research { color: var(--research); }
.nav-item.active.type-saved { color: var(--saved); }

.nav-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.dot-h2 { background: var(--h2); }
.dot-policy { background: var(--policy); }
.dot-research { background: var(--research); }
.dot-saved { background: var(--saved); }

.saved-count {
  margin-left: auto;
  background: var(--surface3);
  color: var(--saved);
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 10px;
  min-width: 20px;
  text-align: center;
}

/* Region filters */
.region-group {
  padding: 0 12px 8px;
}

.region-chips {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.region-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text2);
  transition: all 0.15s ease;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}

.region-chip:hover { background: var(--surface2); }
.region-chip.active { background: var(--surface2); color: var(--text); }
.region-flag { font-size: 14px; }

.region-pip {
  margin-left: auto;
  width: 6px; height: 6px;
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.15s;
}
.region-chip.active .region-pip { opacity: 1; }

.pip-global { background: var(--global); }
.pip-eu { background: var(--eu); }
.pip-mena { background: var(--mena); }
.pip-americas { background: var(--americas); }
.pip-apac { background: var(--apac); }

/* Sidebar bottom */
.sidebar-bottom {
  margin-top: auto;
  padding: 16px 12px;
  border-top: 1px solid var(--border);
}

.refresh-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  background: rgba(52,211,153,0.08);
  border: 1px solid rgba(52,211,153,0.2);
  color: var(--h2);
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.refresh-btn:hover { background: rgba(52,211,153,0.14); }
.refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.refresh-btn svg {
  width: 12px; height: 12px;
  transition: transform 0.5s ease;
}
.refresh-btn.loading svg { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.last-updated {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  text-align: center;
  margin-top: 8px;
  letter-spacing: 0.05em;
}

/* ─── MAIN ─── */
.main {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.topbar {
  padding: 20px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  background: rgba(8,9,11,0.8);
  backdrop-filter: blur(8px);
  position: sticky;
  top: 0;
  z-index: 10;
}

.topbar-title {
  font-family: 'Instrument Serif', serif;
  font-size: 18px;
  color: var(--text);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.date-pill {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 5px 10px;
  border-radius: 4px;
  letter-spacing: 0.08em;
}

.add-linkedin-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text2);
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 7px 12px;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.15s ease;
}
.add-linkedin-btn:hover { border-color: var(--saved); color: var(--saved); }

/* ─── CONTENT ─── */
.content {
  padding: 28px 32px;
  flex: 1;
}

/* Active region badge */
.active-region-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.region-badge {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 9px;
  border-radius: 3px;
  border: 1px solid;
}

.badge-global { color: var(--global); border-color: rgba(192,132,252,0.2); background: rgba(192,132,252,0.06); }
.badge-eu { color: var(--eu); border-color: rgba(96,165,250,0.2); background: rgba(96,165,250,0.06); }
.badge-mena { color: var(--mena); border-color: rgba(251,191,36,0.2); background: rgba(251,191,36,0.06); }
.badge-americas { color: var(--americas); border-color: rgba(248,113,113,0.2); background: rgba(248,113,113,0.06); }
.badge-apac { color: var(--apac); border-color: rgba(74,222,128,0.2); background: rgba(74,222,128,0.06); }

.section-panel { display: none; }
.section-panel.active { display: block; }

/* Cards */
.cards-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px 20px;
  position: relative;
  transition: border-color 0.2s, background 0.2s;
  animation: fadeUp 0.35s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.card:hover { background: var(--surface2); }
.card.h2-card:hover { border-color: rgba(52,211,153,0.25); }
.card.policy-card:hover { border-color: rgba(251,146,60,0.25); }
.card.research-card:hover { border-color: rgba(167,139,250,0.25); }
.card.saved-card { border-color: rgba(244,114,182,0.15); }

.card-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 10px;
}

.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  flex: 1;
}

.tag {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 7px;
  border-radius: 3px;
}

.tag-epc { background: rgba(52,211,153,0.1); color: var(--h2); }
.tag-investment { background: rgba(52,211,153,0.06); color: rgba(52,211,153,0.7); border: 1px solid rgba(52,211,153,0.15); }
.tag-project { background: rgba(52,211,153,0.08); color: var(--h2); }
.tag-regulation { background: rgba(251,146,60,0.1); color: var(--policy); }
.tag-accident { background: rgba(248,113,113,0.12); color: #f87171; }
.tag-policy { background: rgba(251,146,60,0.06); color: rgba(251,146,60,0.7); border: 1px solid rgba(251,146,60,0.15); }
.tag-opec { background: rgba(251,146,60,0.08); color: var(--policy); }
.tag-paper { background: rgba(167,139,250,0.1); color: var(--research); }
.tag-report { background: rgba(167,139,250,0.06); color: rgba(167,139,250,0.7); border: 1px solid rgba(167,139,250,0.15); }
.tag-study { background: rgba(167,139,250,0.08); color: var(--research); }
.tag-linkedin { background: rgba(244,114,182,0.1); color: var(--saved); }

/* Region tag on card */
.tag-region {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  padding: 3px 7px;
  border-radius: 3px;
  letter-spacing: 0.08em;
}

.tag-r-global { background: rgba(192,132,252,0.08); color: var(--global); }
.tag-r-eu { background: rgba(96,165,250,0.08); color: var(--eu); }
.tag-r-mena { background: rgba(251,191,36,0.08); color: var(--mena); }
.tag-r-americas { background: rgba(248,113,113,0.08); color: var(--americas); }
.tag-r-apac { background: rgba(74,222,128,0.08); color: var(--apac); }

.tag-source {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  padding: 3px 0;
}

/* Save button */
.save-btn {
  flex-shrink: 0;
  width: 30px; height: 30px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: none;
  color: var(--text3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s ease;
  font-size: 14px;
}

.save-btn:hover { border-color: var(--saved); color: var(--saved); background: rgba(244,114,182,0.08); }
.save-btn.saved { border-color: rgba(244,114,182,0.3); color: var(--saved); background: rgba(244,114,182,0.08); }

.card-title {
  font-family: 'Instrument Serif', serif;
  font-size: 17px;
  line-height: 1.35;
  color: var(--text);
  margin-bottom: 8px;
}

.card-summary {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.65;
}

.card-detail {
  display: none;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 12.5px;
  color: var(--text2);
  line-height: 1.7;
}
.card-detail.open { display: block; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 14px;
  flex-wrap: wrap;
  gap: 8px;
}

.expand-btn {
  background: none; border: none;
  font-family: 'Geist Mono', monospace;
  font-size: 9px; color: var(--text3);
  cursor: pointer; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 0;
  transition: color 0.15s;
}
.expand-btn:hover { color: var(--text2); }

.card-link {
  font-family: 'Geist Mono', monospace;
  font-size: 10px; letter-spacing: 0.08em;
  text-transform: uppercase; text-decoration: none;
  display: flex; align-items: center; gap: 4px;
  transition: gap 0.15s ease;
}
.card-link:hover { gap: 7px; }
.link-h2 { color: var(--h2); }
.link-policy { color: var(--policy); }
.link-research { color: var(--research); }
.link-saved { color: var(--saved); }

.card-date {
  font-family: 'Geist Mono', monospace;
  font-size: 10px; color: var(--text3);
}

/* LinkedIn note */
.linkedin-note {
  font-family: 'Geist Mono', monospace;
  font-size: 9px; color: var(--text3);
  margin-top: 4px; letter-spacing: 0.05em;
  font-style: italic;
}

/* Delete btn for saved */
.delete-btn {
  background: none; border: none;
  font-family: 'Geist Mono', monospace;
  font-size: 9px; color: var(--text3);
  cursor: pointer; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 0;
  transition: color 0.15s;
}
.delete-btn:hover { color: #f87171; }

/* ─── LOADING ─── */
.loading-state { display: flex; flex-direction: column; gap: 10px; }

.skeleton {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px 20px;
  animation: pulse 1.8s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }

.skel-line {
  background: var(--border2);
  border-radius: 3px;
  margin-bottom: 8px;
}

.loading-msg {
  font-family: 'Geist Mono', monospace;
  font-size: 10px; color: var(--text3);
  text-align: center; letter-spacing: 0.1em;
  padding: 10px 0 16px;
}

/* Error */
.error-state {
  background: var(--surface);
  border: 1px solid rgba(248,113,113,0.15);
  border-radius: 8px; padding: 24px;
  text-align: center;
}
.error-state p {
  font-family: 'Geist Mono', monospace;
  font-size: 11px; color: #f87171; letter-spacing: 0.05em;
}

/* Empty saved */
.empty-saved {
  padding: 60px 20px;
  text-align: center;
}
.empty-saved .icon { font-size: 36px; margin-bottom: 16px; opacity: 0.4; }
.empty-saved p { font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text3); letter-spacing: 0.08em; line-height: 1.8; }

/* ─── LINKEDIN MODAL ─── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  width: 100%; max-width: 560px;
  padding: 28px;
  animation: modalIn 0.2s ease;
}
@keyframes modalIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }

.modal-title {
  font-family: 'Instrument Serif', serif;
  font-size: 20px; color: var(--text);
  margin-bottom: 6px;
}
.modal-sub {
  font-family: 'Geist Mono', monospace;
  font-size: 10px; color: var(--text3);
  letter-spacing: 0.08em; margin-bottom: 20px;
}

.modal label {
  display: block;
  font-family: 'Geist Mono', monospace;
  font-size: 9px; color: var(--text3);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 6px; margin-top: 14px;
}

.modal input, .modal textarea, .modal select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 5px;
  color: var(--text);
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  padding: 9px 12px;
  outline: none;
  transition: border-color 0.15s;
  resize: vertical;
}
.modal input:focus, .modal textarea:focus, .modal select:focus {
  border-color: var(--saved);
}
.modal select option { background: var(--surface2); }

.modal textarea { min-height: 100px; }

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.modal-save {
  flex: 1;
  background: rgba(244,114,182,0.1);
  border: 1px solid rgba(244,114,182,0.25);
  color: var(--saved);
  font-family: 'Geist Mono', monospace;
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 10px;
  border-radius: 5px; cursor: pointer;
  transition: all 0.15s;
}
.modal-save:hover { background: rgba(244,114,182,0.16); }

.modal-cancel {
  background: none;
  border: 1px solid var(--border2);
  color: var(--text2);
  font-family: 'Geist Mono', monospace;
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 10px 16px;
  border-radius: 5px; cursor: pointer;
  transition: all 0.15s;
}
.modal-cancel:hover { border-color: var(--text2); }

/* Processing modal state */
.modal-processing {
  text-align: center; padding: 20px 0;
}
.modal-processing p {
  font-family: 'Geist Mono', monospace;
  font-size: 11px; color: var(--text3);
  letter-spacing: 0.08em; margin-top: 10px;
}
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border2);
  border-top-color: var(--saved);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 700px) {
  .app { grid-template-columns: 1fr; }
  .sidebar {
    position: relative; height: auto;
    flex-direction: row; flex-wrap: wrap;
    overflow: visible;
  }
  .brand { flex: 1; min-width: 200px; }
  .nav-group, .region-group { width: 100%; padding: 8px 12px; }
  .nav-group { display: flex; flex-wrap: wrap; gap: 4px; }
  .region-group { display: flex; flex-wrap: wrap; gap: 4px; }
  .region-chips { flex-direction: row; flex-wrap: wrap; }
  .sidebar-bottom { width: 100%; }
  .content { padding: 20px 16px; }
  .topbar { padding: 14px 16px; }
}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="app">

  <!-- ─── SIDEBAR ─── -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-name">Energy<span>Intel</span></div>
      <div class="brand-sub">Daily Digest · AI-Powered</div>
    </div>

    <div class="nav-group">
      <div class="nav-label">Sections</div>
      <button class="nav-item active type-h2" onclick="switchSection('h2')">
        <div class="nav-dot dot-h2"></div> H₂ & Syngas
      </button>
      <button class="nav-item type-policy" onclick="switchSection('policy')">
        <div class="nav-dot dot-policy"></div> Policy & O&G
      </button>
      <button class="nav-item type-research" onclick="switchSection('research')">
        <div class="nav-dot dot-research"></div> Research
      </button>
      <button class="nav-item type-saved" onclick="switchSection('saved')">
        <div class="nav-dot dot-saved"></div> Saved
        <span class="saved-count" id="savedCount">0</span>
      </button>
    </div>

    <div class="region-group">
      <div class="nav-label">Region Filter</div>
      <div class="region-chips">
        <button class="region-chip active" data-region="global" onclick="toggleRegion('global')">
          <span class="region-flag">🌍</span> All Regions
          <span class="region-pip pip-global"></span>
        </button>
        <button class="region-chip" data-region="eu" onclick="toggleRegion('eu')">
          <span class="region-flag">🇪🇺</span> Europe
          <span class="region-pip pip-eu"></span>
        </button>
        <button class="region-chip" data-region="mena" onclick="toggleRegion('mena')">
          <span class="region-flag">🇸🇦</span> MENA
          <span class="region-pip pip-mena"></span>
        </button>
        <button class="region-chip" data-region="americas" onclick="toggleRegion('americas')">
          <span class="region-flag">🌎</span> Americas
          <span class="region-pip pip-americas"></span>
        </button>
        <button class="region-chip" data-region="apac" onclick="toggleRegion('apac')">
          <span class="region-flag">🌏</span> Asia-Pacific
          <span class="region-pip pip-apac"></span>
        </button>
      </div>
    </div>

    <div class="sidebar-bottom">
      <button class="refresh-btn" id="refreshBtn" onclick="fetchAllNews()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        Refresh News
      </button>
      <div class="last-updated" id="lastUpdated"></div>
    </div>
  </aside>

  <!-- ─── MAIN ─── -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-title" id="sectionTitle">H₂ & Syngas</div>
      <div class="topbar-right">
        <div class="date-pill" id="datePill"></div>
        <button class="add-linkedin-btn" onclick="openLinkedInModal()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
          Save LinkedIn Post
        </button>
      </div>
    </div>

    <div class="content">

      <!-- Region badges -->
      <div class="active-region-bar" id="regionBar"></div>

      <!-- H2 Section -->
      <div class="section-panel active" id="panel-h2">
        <div id="h2-content"></div>
      </div>

      <!-- Policy Section -->
      <div class="section-panel" id="panel-policy">
        <div id="policy-content"></div>
      </div>

      <!-- Research Section -->
      <div class="section-panel" id="panel-research">
        <div id="research-content"></div>
      </div>

      <!-- Saved Section -->
      <div class="section-panel" id="panel-saved">
        <div id="saved-content"></div>
      </div>

    </div>
  </main>
</div>

<!-- ─── LINKEDIN MODAL ─── -->
<div class="modal-overlay" id="linkedinModal">
  <div class="modal">
    <div id="modalBody">
      <div class="modal-title">Save LinkedIn Post</div>
      <div class="modal-sub">Paste the post text or URL — Claude will summarize & categorize it</div>

      <label>Post text or URL</label>
      <textarea id="liContent" placeholder="Paste LinkedIn post text here..."></textarea>

      <label>Your note (optional)</label>
      <input type="text" id="liNote" placeholder="Why did you save this?">

      <label>Category</label>
      <select id="liCategory">
        <option value="h2">H₂ & Syngas</option>
        <option value="policy">Policy & O&G</option>
        <option value="research">Research</option>
      </select>

      <div class="modal-actions">
        <button class="modal-cancel" onclick="closeLinkedInModal()">Cancel</button>
        <button class="modal-save" onclick="saveLinkedInPost()">✦ Save & Summarize</button>
      </div>
    </div>
  </div>
</div>

<script>
// ─── STATE ───
const API = "https://api.anthropic.com/v1/messages";
const MODEL = "claude-sonnet-4-20250514";

let activeSection = 'h2';
let activeRegion = 'global';
let savedItems = [];
let newsCache = { h2: null, policy: null, research: null };
let isFetching = false;

const REGION_LABELS = {
  global: { label: 'All Regions', cls: 'badge-global', flag: '🌍' },
  eu: { label: 'Europe', cls: 'badge-eu', flag: '🇪🇺' },
  mena: { label: 'MENA', cls: 'badge-mena', flag: '🇸🇦' },
  americas: { label: 'Americas', cls: 'badge-americas', flag: '🌎' },
  apac: { label: 'Asia-Pacific', cls: 'badge-apac', flag: '🌏' },
};

const SECTION_TITLES = {
  h2: 'H₂ & Syngas',
  policy: 'Policy & O&G',
  research: 'Research',
  saved: 'Saved Articles'
};

// ─── INIT ───
function init() {
  updateDate();
  loadSaved();
  renderRegionBar();
  showLoadingAll();
  fetchAllNews();
}

function updateDate() {
  const now = new Date();
  document.getElementById('datePill').textContent = now.toLocaleDateString('en-GB', {
    weekday: 'short', day: 'numeric', month: 'short', year: 'numeric'
  }).toUpperCase();
}

// ─── NAVIGATION ───
function switchSection(sec) {
  activeSection = sec;
  document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active', 'type-h2','type-policy','type-research','type-saved'));
  document.getElementById(`panel-${sec}`).classList.add('active');
  const btn = document.querySelector(`[onclick="switchSection('${sec}')"]`);
  btn.classList.add('active', `type-${sec}`);
  document.getElementById('sectionTitle').textContent = SECTION_TITLES[sec];
  if (sec === 'saved') renderSaved();
}

function toggleRegion(region) {
  activeRegion = region;
  document.querySelectorAll('.region-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.region === region);
  });
  renderRegionBar();
  // Re-render any loaded news with region filter
  if (newsCache.h2) renderSection('h2', newsCache.h2);
  if (newsCache.policy) renderSection('policy', newsCache.policy);
  if (newsCache.research) renderSection('research', newsCache.research);
}

function renderRegionBar() {
  const bar = document.getElementById('regionBar');
  const r = REGION_LABELS[activeRegion];
  bar.innerHTML = `<span class="region-badge ${r.cls}">${r.flag} ${r.label}</span>`;
}

// ─── LOADING SKELETONS ───
function showLoadingAll() {
  ['h2','policy','research'].forEach(t => {
    const labels = { h2: 'Searching H₂ & syngas news...', policy: 'Fetching policy & O&G news...', research: 'Retrieving research papers...' };
    document.getElementById(`${t}-content`).innerHTML = `
      <div class="loading-state">
        <div class="loading-msg">${labels[t]}</div>
        ${[90,75,85].map(w => `<div class="skeleton">
          <div class="skel-line" style="height:9px;width:30%;margin-bottom:10px"></div>
          <div class="skel-line" style="height:17px;width:${w}%"></div>
          <div class="skel-line" style="height:12px;width:65%"></div>
        </div>`).join('')}
      </div>`;
  });
}

// ─── FETCH ───
async function fetchAllNews() {
  if (isFetching) return;
  isFetching = true;
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  btn.disabled = true;

  showLoadingAll();
  newsCache = { h2: null, policy: null, research: null };

  const types = ['h2','policy','research'];
  const results = await Promise.allSettled(types.map(t => fetchSection(t)));

  results.forEach((res, i) => {
    const type = types[i];
    if (res.status === 'fulfilled') {
      newsCache[type] = res.value;
      renderSection(type, res.value);
    } else {
      document.getElementById(`${type}-content`).innerHTML =
        `<div class="error-state"><p>⚠ Failed to load. Try refreshing.</p><p style="margin-top:6px;color:var(--text3);font-size:10px">${res.reason?.message||''}</p></div>`;
    }
  });

  const now = new Date();
  document.getElementById('lastUpdated').textContent = `Updated ${now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`;

  btn.classList.remove('loading');
  btn.disabled = false;
  isFetching = false;
}

async function fetchSection(type) {
  const today = new Date().toLocaleDateString('en-GB', {weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const regionHint = activeRegion === 'global' ? 'from any region globally' : `with a focus on ${REGION_LABELS[activeRegion].label}`;

  const prompts = {
    h2: `Today is ${today}. You are an energy analyst. Search the web for the LATEST news (last 7 days) about hydrogen and syngas industry ${regionHint}. Focus on:
- EPC/EPCM/FEED contract awards won by engineering companies
- New investment rounds, funding announcements, or new investors in green/blue hydrogen
- New hydrogen project announcements or FIDs
- Electrolyzer, SMR, ATR equipment orders

Return ONLY a valid JSON array of exactly 5 items. Each item:
{"title":"...","summary":"2 sentence plain summary","detail":"3-4 sentence technical detail","source":"publication name","url":"article url or #","tag":"EPC Award|Investment|Project|Partnership|Equipment","tagClass":"tag-epc|tag-investment|tag-project","region":"global|eu|mena|americas|apac","date":"Apr 12, 2025"}

Return ONLY the JSON array, no markdown, no explanation.`,

    policy: `Today is ${today}. You are an oil & gas policy analyst. Search the web for LATEST news (last 7 days) about energy policy and oil & gas ${regionHint}. Focus on:
- New energy regulations, policies, or legislation passed/proposed
- Oil & gas accidents, spills, or safety incidents
- OPEC decisions, oil/gas price moves, LNG market news
- Government subsidies or hydrogen policy frameworks

Return ONLY a valid JSON array of exactly 5 items. Each item:
{"title":"...","summary":"2 sentence plain summary","detail":"3-4 sentence context","source":"publication name","url":"article url or #","tag":"Regulation|Accident|OPEC/LNG|Policy|Geopolitics","tagClass":"tag-regulation|tag-accident|tag-policy|tag-opec","region":"global|eu|mena|americas|apac","date":"Apr 12, 2025"}

Return ONLY the JSON array, no markdown, no explanation.`,

    research: `Today is ${today}. You are a clean energy research analyst. Search the web for LATEST publications (last 30 days) about clean energy science and engineering ${regionHint}. Focus on:
- Academic papers on hydrogen production, storage, transport, or fuel cells
- New carbon capture (CCS/CCUS) research or pilot results
- Syngas, Fischer-Tropsch, or methanol synthesis studies
- IEA, IRENA, BloombergNEF, or major consultancy reports

Return ONLY a valid JSON array of exactly 5 items. Each item:
{"title":"...","summary":"2 sentence plain-language summary","detail":"3-4 sentence methodology/findings","source":"journal or institution","url":"doi or report url or #","tag":"Paper|Report|Study|Breakthrough|Review","tagClass":"tag-paper|tag-report|tag-study","region":"global|eu|mena|americas|apac","date":"Apr 2025"}

Return ONLY the JSON array, no markdown, no explanation.`
  };

  const response = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 1000,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [{ role: "user", content: prompts[type] }]
    })
  });

  if (!response.ok) throw new Error(`API ${response.status}`);
  const data = await response.json();

  const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');
  const match = text.match(/\[[\s\S]*\]/);
  if (!match) throw new Error('No JSON in response');
  return JSON.parse(match[0]);
}

// ─── RENDER ───
function filterByRegion(items) {
  if (activeRegion === 'global') return items;
  return items.filter(i => !i.region || i.region === activeRegion || i.region === 'global');
}

function renderSection(type, items) {
  const filtered = filterByRegion(items);
  const el = document.getElementById(`${type}-content`);
  if (!filtered.length) {
    el.innerHTML = `<div class="error-state"><p>No ${REGION_LABELS[activeRegion].label} results in this section. Try "All Regions".</p></div>`;
    return;
  }
  el.innerHTML = `<div class="cards-grid">${filtered.map((item, i) => cardHTML(item, type, i)).join('')}</div>`;
}

function cardHTML(item, type, idx) {
  const regionMeta = REGION_LABELS[item.region || 'global'];
  const isSaved = savedItems.some(s => s.title === item.title);
  const savedClass = isSaved ? 'saved' : '';
  const savedIcon = isSaved ? '♥' : '♡';

  return `<div class="card ${type}-card" style="animation-delay:${idx*0.06}s">
    <div class="card-header">
      <div class="card-tags">
        <span class="tag ${item.tagClass||'tag-'+type}">${item.tag||'News'}</span>
        ${item.region && item.region !== 'global' ? `<span class="tag tag-region tag-r-${item.region}">${regionMeta?.flag||''} ${regionMeta?.label||item.region}</span>` : ''}
        <span class="tag-source">${item.source||''}</span>
      </div>
      <button class="save-btn ${savedClass}" onclick="toggleSave(this, ${JSON.stringify(item).replace(/"/g,'&quot;')}, '${type}')" title="Save article">${savedIcon}</button>
    </div>
    <div class="card-title">${item.title}</div>
    <div class="card-summary">${item.summary}</div>
    ${item.detail ? `<button class="expand-btn" onclick="toggleDetail(this)">+ More detail</button><div class="card-detail">${item.detail}</div>` : ''}
    <div class="card-footer">
      <button class="expand-btn" onclick="toggleDetail(this.closest('.card').querySelector('.card-detail'), this)" style="display:none"></button>
      ${item.url && item.url !== '#'
        ? `<a class="card-link link-${type}" href="${item.url}" target="_blank" rel="noopener">Read source →</a>`
        : `<span></span>`}
      <span class="card-date">${item.date||'Recent'}</span>
    </div>
  </div>`;
}

function toggleDetail(btn) {
  const detail = btn.nextElementSibling;
  if (!detail || !detail.classList.contains('card-detail')) return;
  detail.classList.toggle('open');
  btn.textContent = detail.classList.contains('open') ? '− Less detail' : '+ More detail';
}

// ─── SAVED ───
function loadSaved() {
  try {
    savedItems = JSON.parse(localStorage.getItem('energyintel_saved') || '[]');
  } catch { savedItems = []; }
  updateSavedCount();
}

function persistSaved() {
  localStorage.setItem('energyintel_saved', JSON.stringify(savedItems));
  updateSavedCount();
}

function updateSavedCount() {
  document.getElementById('savedCount').textContent = savedItems.length;
}

function toggleSave(btn, item, type) {
  const idx = savedItems.findIndex(s => s.title === item.title);
  if (idx === -1) {
    savedItems.unshift({ ...item, type, savedAt: new Date().toISOString() });
    btn.classList.add('saved');
    btn.textContent = '♥';
  } else {
    savedItems.splice(idx, 1);
    btn.classList.remove('saved');
    btn.textContent = '♡';
  }
  persistSaved();
  if (activeSection === 'saved') renderSaved();
}

function renderSaved() {
  const el = document.getElementById('saved-content');
  if (!savedItems.length) {
    el.innerHTML = `<div class="empty-saved">
      <div class="icon">🔖</div>
      <p>No saved articles yet.<br>Click ♡ on any news card<br>or paste a LinkedIn post to save it here.</p>
    </div>`;
    return;
  }
  el.innerHTML = `<div class="cards-grid">${savedItems.map((item, i) => savedCardHTML(item, i)).join('')}</div>`;
}

function savedCardHTML(item, idx) {
  const typeColors = { h2: 'link-h2', policy: 'link-policy', research: 'link-research' };
  const regionMeta = REGION_LABELS[item.region || 'global'];
  const savedDate = item.savedAt ? new Date(item.savedAt).toLocaleDateString('en-GB',{day:'numeric',month:'short'}) : '';

  return `<div class="card saved-card" style="animation-delay:${idx*0.05}s">
    <div class="card-header">
      <div class="card-tags">
        ${item.isLinkedIn ? `<span class="tag tag-linkedin">LinkedIn</span>` : `<span class="tag tag-${item.tagClass?.split('-')[1]||'epc'}">${item.tag||'Saved'}</span>`}
        ${item.region && item.region !== 'global' ? `<span class="tag tag-region tag-r-${item.region}">${regionMeta?.flag||''} ${regionMeta?.label||item.region}</span>` : ''}
        <span class="tag-source">${item.source||''}</span>
      </div>
      <button class="save-btn saved" onclick="removeSaved(${idx})" title="Remove">♥</button>
    </div>
    <div class="card-title">${item.title}</div>
    <div class="card-summary">${item.summary}</div>
    ${item.detail ? `<button class="expand-btn" onclick="toggleDetail(this)">+ More detail</button><div class="card-detail">${item.detail}</div>` : ''}
    ${item.userNote ? `<div class="linkedin-note">📝 "${item.userNote}"</div>` : ''}
    <div class="card-footer">
      ${item.url && item.url !== '#'
        ? `<a class="card-link ${typeColors[item.type]||'link-saved'}" href="${item.url}" target="_blank" rel="noopener">Read source →</a>`
        : `<span></span>`}
      <div style="display:flex;align-items:center;gap:10px">
        ${savedDate ? `<span class="card-date">Saved ${savedDate}</span>` : ''}
        <button class="delete-btn" onclick="removeSaved(${idx})">Remove</button>
      </div>
    </div>
  </div>`;
}

function removeSaved(idx) {
  savedItems.splice(idx, 1);
  persistSaved();
  renderSaved();
}

// ─── LINKEDIN MODAL ───
function openLinkedInModal() {
  document.getElementById('linkedinModal').classList.add('open');
  document.getElementById('liContent').value = '';
  document.getElementById('liNote').value = '';
  document.getElementById('modalBody').innerHTML = getModalFormHTML();
}

function getModalFormHTML() {
  return `<div class="modal-title">Save LinkedIn Post</div>
  <div class="modal-sub">Paste the post text or URL — Claude will summarize & categorize it</div>
  <label>Post text or URL</label>
  <textarea id="liContent" placeholder="Paste the LinkedIn post content here..."></textarea>
  <label>Your note (optional)</label>
  <input type="text" id="liNote" placeholder="Why is this relevant?">
  <label>Category</label>
  <select id="liCategory">
    <option value="h2">H₂ & Syngas</option>
    <option value="policy">Policy & O&G</option>
    <option value="research">Research</option>
  </select>
  <div class="modal-actions">
    <button class="modal-cancel" onclick="closeLinkedInModal()">Cancel</button>
    <button class="modal-save" onclick="saveLinkedInPost()">✦ Save & Summarize</button>
  </div>`;
}

function closeLinkedInModal() {
  document.getElementById('linkedinModal').classList.remove('open');
}

async function saveLinkedInPost() {
  const content = document.getElementById('liContent').value.trim();
  const note = document.getElementById('liNote').value.trim();
  const category = document.getElementById('liCategory').value;

  if (!content) { alert('Please paste the post content.'); return; }

  // Show processing state
  document.getElementById('modalBody').innerHTML = `<div class="modal-processing">
    <div class="spinner"></div>
    <p>Claude is summarizing this post...</p>
  </div>`;

  try {
    const response = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `You are an energy industry analyst. A user pasted this LinkedIn post or content they want to save:

---
${content}
---

Analyze it and return ONLY a JSON object (no markdown) with these fields:
{
  "title": "concise headline summarizing the post (max 12 words)",
  "summary": "2 clear sentences explaining the key takeaway",
  "detail": "2-3 sentences with additional context or technical detail",
  "source": "author name or company if identifiable, otherwise 'LinkedIn'",
  "tag": "most fitting: EPC Award | Investment | Project | Regulation | Accident | Paper | Report | Other",
  "tagClass": "tag-epc | tag-investment | tag-project | tag-regulation | tag-accident | tag-paper | tag-report",
  "region": "best fit: global | eu | mena | americas | apac",
  "url": "#"
}

Return ONLY the JSON object.`
        }]
      })
    });

    if (!response.ok) throw new Error('API error');
    const data = await response.json();
    const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('No JSON');

    const parsed = JSON.parse(match[0]);
    const item = { ...parsed, type: category, isLinkedIn: true, userNote: note, savedAt: new Date().toISOString() };
    savedItems.unshift(item);
    persistSaved();
    closeLinkedInModal();
    switchSection('saved');

  } catch(e) {
    document.getElementById('modalBody').innerHTML = `${getModalFormHTML()}`;
    // Restore values not possible since DOM was replaced, show error
    alert('Could not process the post. Please try again.');
  }
}

// Close modal on overlay click
document.getElementById('linkedinModal').addEventListener('click', function(e) {
  if (e.target === this) closeLinkedInModal();
});

// ─── START ───
init();
</script>
</body>
</html>
